services:

  # DATABASE
  database:
    image: postgres:16
    container_name: url-shortener-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5443:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - url-data:/var/lib/postgresql/data
    networks:
      - url_shortener_net


  # MIGRATION
  migrate:
    image: postgres:16
    container_name: url-shortener-migrate
    depends_on:
      database:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - ./src/main/resources/db/migration/schema.sql:/schema.sql:ro
    entrypoint:
      - sh
      - -c
      - |
        echo "Waiting for DB..."
        until pg_isready -h database -U ${DB_USERNAME}; do
          sleep 2
        done
        echo "Running migrations..."
        psql -h database -U ${DB_USERNAME} -d ${DB_NAME} -f /schema.sql
        echo "Migration completed"
    networks:
      - url_shortener_net


  # APPLICATION
  app:
    build: .
    image: nsahil992/url-shortener:${VERSION}
    container_name: url-shortener
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    networks:
      - url_shortener_net


networks:
  url_shortener_net:


volumes:
  url-data: